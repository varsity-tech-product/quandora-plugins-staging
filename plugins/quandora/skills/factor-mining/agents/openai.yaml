interface:
  display_name: "Factor Mining"
  short_description: "Write and backtest Quandora factor plugins"
  default_prompt: "Use $factor-mining to list public tasks or run a custom factor idea."

dependencies:
  tools:
    - type: "mcp"
      value: "quandora"
      description: "Quandora Factor Mining connection"
      transport: "streamable_http"
      url: "https://mcp.quandora.ai/factor-mining"
      oauth_resource: "https://mcp.quandora.ai/factor-mining"
