interface:
  display_name: "Factor Mining"
  short_description: "Write and backtest Quandora factor plugins"
  default_prompt: "Use $factor-mining to list public tasks or run a custom factor idea."

dependencies:
  tools:
    - type: "mcp"
      value: "quandora-mcp"
      description: "Quandora Factor Mining Remote MCP server"
      transport: "streamable_http"
      url: "https://mcp-staging.varsity.lol/factor-mining"
      oauth_resource: "https://mcp-staging.varsity.lol/factor-mining"
