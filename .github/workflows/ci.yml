name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "feat/**"
      - "feature/**"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run unit tests
        run: python3 -m unittest discover -s codex/plugins/factor-mining/tests -v

      - name: Compile Python sources
        run: |
          python3 -m compileall -q codex/plugins/factor-mining/scripts codex/plugins/factor-mining/tests
          python3 -m compileall -q claude-code/scripts openclaw/scripts

      - name: Validate JSON files
        run: |
          python3 -m json.tool .agents/plugins/marketplace.json >/dev/null
          python3 -m json.tool codex/plugins/factor-mining/.codex-plugin/plugin.json >/dev/null
          python3 -m json.tool claude-code/.claude-plugin/plugin.json >/dev/null
          python3 -m json.tool openclaw/openclaw.plugin.json >/dev/null

      - name: Validate Codex installer
        run: bash -n install-codex.sh

      - name: Scan product text
        run: |
          python3 - <<'PY' >/tmp/factor-mining-forbidden.txt
          terms = [
              "/" + "Users" + "/" + "richsion",
              "Desktop" + "/" + "quandora",
              "local" + "host",
              "M" + "VP",
              "private" + " repo",
              "Development" + " Validation",
              "super" + "powers",
              "agent-plugin-" + "mvp",
              "TO" + "DO",
              "FIX" + "ME",
              "open" + "code",
              "Open" + "Code",
          ]
          for term in terms:
              print(term)
          PY
          if grep -RIn -f /tmp/factor-mining-forbidden.txt . --exclude-dir=.git --exclude-dir=__pycache__; then
            exit 1
          fi

      - name: Run mock backend acceptance
        run: python3 codex/plugins/factor-mining/tests/acceptance/run_mock_acceptance.py

      - name: Validate Claude Code plugin when available
        run: |
          if command -v claude >/dev/null 2>&1; then
            claude plugin validate claude-code
          else
            echo "Claude CLI is not available in this environment; skipping Claude Code plugin validation."
          fi

      - name: Optional Codex plugin validation
        run: |
          python3 -m pip install -r requirements-dev.txt
          if command -v codex-plugin-validator >/dev/null 2>&1; then
            codex-plugin-validator codex/plugins/factor-mining
          elif python3 -c "import codex_plugin_validator" >/dev/null 2>&1; then
            python3 -m codex_plugin_validator codex/plugins/factor-mining
          else
            echo "Codex plugin validator is not available in this environment; skipping optional validation."
          fi
